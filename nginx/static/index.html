<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Anomaly Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      padding: 24px;
    }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 20px;
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.75rem; font-weight: 500; color: #636e72; text-transform: uppercase; letter-spacing: .04em; }

    select, input[type="datetime-local"] {
      padding: 7px 10px;
      border: 1px solid #dfe6e9;
      border-radius: 5px;
      font-size: 0.9rem;
      background: #fff;
      color: #2d3436;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-primary   { background: #0984e3; color: #fff; }
    .btn-secondary { background: #dfe6e9; color: #2d3436; }
    .btn-warning   { background: #e17055; color: #fff; }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status-msg {
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 5px;
      font-size: 0.875rem;
      display: none;
    }
    #status-msg.info    { background: #d0e8ff; color: #0c5ba0; display: block; }
    #status-msg.success { background: #d4efdf; color: #1a6b3c; display: block; }
    #status-msg.error   { background: #fde8e8; color: #8b1a1a; display: block; }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      background: #f0f3f8;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #636e72;
      white-space: nowrap;
    }

    tbody tr { border-top: 1px solid #f0f3f8; }
    tbody tr:hover { background: #fafbff; }
    td { padding: 10px 14px; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #ffe5d0;
      color: #a0440a;
    }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: #b2bec3;
      font-style: italic;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid #f0f3f8;
      font-size: 0.85rem;
      color: #636e72;
    }

    .pagination-controls { display: flex; gap: 8px; }
  </style>
</head>
<body>

<h1>Sensor Anomaly Dashboard</h1>

<div id="status-msg"></div>

<div class="toolbar">
  <div class="field">
    <label for="sensor-select">Sensor</label>
    <select id="sensor-select">
      <option value="">All sensors</option>
    </select>
  </div>

  <div class="field">
    <label for="start-input">From</label>
    <input type="datetime-local" id="start-input" />
  </div>

  <div class="field">
    <label for="end-input">To</label>
    <input type="datetime-local" id="end-input" />
  </div>

  <div class="field">
    <label>&nbsp;</label>
    <button class="btn-secondary" onclick="resetFilters()">Reset</button>
  </div>

  <div class="field" style="margin-left:auto">
    <label>&nbsp;</label>
    <button id="ingest-btn" class="btn-warning" onclick="triggerIngest()">Trigger Ingest</button>
  </div>
</div>

<div class="card">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Sensor ID</th>
          <th>Location</th>
          <th>Anomaly Type</th>
          <th>Confidence</th>
          <th>Detected At</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr class="empty-row"><td colspan="6">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <span id="page-info">—</span>
    <div class="pagination-controls">
      <button class="btn-secondary" id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <button class="btn-secondary" id="next-btn" onclick="changePage(1)"  disabled>Next →</button>
    </div>
  </div>
</div>

<script>
  const PAGE_SIZE = 50;
  let currentPage = 1;
  let totalResults = 0;

  // ── Sensor dropdown ─────────────────────────────────────────────────────────
  async function loadSensors() {
    try {
      const res = await fetch('/api/sensors');
      if (!res.ok) return;
      const sensors = await res.json();
      const sel = document.getElementById('sensor-select');
      sensors.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.sensor_id;
        opt.textContent = `${s.sensor_id} (${s.reading_count} readings)`;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.warn('Could not load sensors:', e);
    }
  }

  // ── Anomaly table ───────────────────────────────────────────────────────────
  function buildQuery() {
    const params = new URLSearchParams();
    const sensor = document.getElementById('sensor-select').value;
    const start  = document.getElementById('start-input').value;
    const end    = document.getElementById('end-input').value;
    if (sensor) params.set('sensor_id', sensor);
    if (start)  params.set('start', new Date(start).toISOString());
    if (end)    params.set('end',   new Date(end).toISOString());
    params.set('page', currentPage);
    params.set('page_size', PAGE_SIZE);
    return params.toString();
  }

  function fmt(isoStr) {
    if (!isoStr) return '—';
    return new Date(isoStr).toLocaleString();
  }

  async function fetchAnomalies() {
    const tbody = document.getElementById('results-body');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Loading…</td></tr>';

    try {
      const res = await fetch('/api/anomalies?' + buildQuery());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      totalResults = data.total;
      renderTable(data.results);
      updatePagination(data.total, data.page, data.page_size);
    } catch (e) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Error: ${e.message}</td></tr>`;
    }
  }

  function renderTable(rows) {
    const tbody = document.getElementById('results-body');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No anomalies found.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${fmt(r.timestamp)}</td>
        <td>${r.sensor_id ?? '—'}</td>
        <td>${r.location   ?? '—'}</td>
        <td><span class="badge">${r.anomaly_type ?? '—'}</span></td>
        <td>${r.confidence_score != null ? r.confidence_score.toFixed(2) : '—'}</td>
        <td>${fmt(r.detected_at)}</td>
      </tr>
    `).join('');
  }

  function updatePagination(total, page, pageSize) {
    const start = total === 0 ? 0 : (page - 1) * pageSize + 1;
    const end   = Math.min(page * pageSize, total);
    document.getElementById('page-info').textContent =
      total === 0 ? 'No results' : `Showing ${start}–${end} of ${total}`;
    document.getElementById('prev-btn').disabled = page <= 1;
    document.getElementById('next-btn').disabled = end >= total;
  }

  function changePage(delta) {
    const maxPage = Math.ceil(totalResults / PAGE_SIZE);
    currentPage = Math.max(1, Math.min(currentPage + delta, maxPage));
    fetchAnomalies();
  }

  function resetFilters() {
    document.getElementById('sensor-select').value = '';
    document.getElementById('start-input').value  = '';
    document.getElementById('end-input').value    = '';
    currentPage = 1;
    fetchAnomalies();
  }

  // ── Filter change handlers ──────────────────────────────────────────────────
  ['sensor-select', 'start-input', 'end-input'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      currentPage = 1;
      fetchAnomalies();
    });
  });

  // ── Ingest trigger ──────────────────────────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = type;
    if (type !== 'info') setTimeout(() => { el.style.display = 'none'; }, 6000);
  }

  async function triggerIngest() {
    const btn = document.getElementById('ingest-btn');
    btn.disabled = true;
    showStatus('Ingest triggered — the worker is running in the background.', 'info');
    try {
      const res = await fetch('/api/ingest', { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      showStatus(`Accepted (job ${data.job_id}). Refresh the table in a moment.`, 'success');
      setTimeout(fetchAnomalies, 5000);
    } catch (e) {
      showStatus(`Ingest request failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  loadSensors();
  fetchAnomalies();
</script>
</body>
</html>
