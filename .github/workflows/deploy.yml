name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_API_REPO: research-pipeline-api
  ECR_WORKER_REPO: research-pipeline-worker
  ECR_MIGRATE_REPO: research-pipeline-migrate
  ECR_NGINX_REPO: research-pipeline-nginx
  ECS_CLUSTER: research-pipeline
  ECS_APP_SERVICE: research-pipeline-app

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check deployed infrastructure
        id: infra
        run: |
          set +e
          aws ecr describe-repositories \
            --repository-names \
              "$ECR_API_REPO" \
              "$ECR_WORKER_REPO" \
              "$ECR_MIGRATE_REPO" \
              "$ECR_NGINX_REPO" \
            --region "$AWS_REGION" >/tmp/ecr-repos.json 2>/tmp/ecr-error.txt
          ECR_STATUS=$?

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_APP_SERVICE" \
            --region "$AWS_REGION" \
            --query 'length(failures) == `0` && services[0].status == `ACTIVE`' \
            --output text >/tmp/ecs-service-ready.txt 2>/tmp/ecs-error.txt
          ECS_STATUS=$?
          ECS_READY=$(cat /tmp/ecs-service-ready.txt 2>/dev/null)
          set -e

          if [ "$ECR_STATUS" = "0" ] && [ "$ECS_STATUS" = "0" ] && [ "$ECS_READY" = "True" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Infrastructure is present; continuing deployment."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Deployment skipped"
              echo ""
              echo "Terraform-managed infrastructure is not currently present."
              echo "Run Terraform first, then push again or rerun this workflow."
              echo ""
              echo "Expected ECR repositories:"
              echo "- \`$ECR_API_REPO\`"
              echo "- \`$ECR_WORKER_REPO\`"
              echo "- \`$ECR_MIGRATE_REPO\`"
              echo "- \`$ECR_NGINX_REPO\`"
              echo ""
              echo "Expected ECS service:"
              echo "- cluster: \`$ECS_CLUSTER\`"
              echo "- service: \`$ECS_APP_SERVICE\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Login to Amazon ECR
        if: steps.infra.outputs.ready == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        if: steps.infra.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_NGINX_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_NGINX_REPO:latest" \
            ./nginx
          docker push "$REGISTRY/$ECR_NGINX_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_NGINX_REPO:latest"

          docker build \
            -t "$REGISTRY/$ECR_API_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_API_REPO:latest" \
            ./api
          docker push "$REGISTRY/$ECR_API_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_API_REPO:latest"

          docker build \
            -t "$REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_WORKER_REPO:latest" \
            ./worker
          docker push "$REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_WORKER_REPO:latest"

          docker build \
            -f migrate/Dockerfile \
            -t "$REGISTRY/$ECR_MIGRATE_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_MIGRATE_REPO:latest" \
            .
          docker push "$REGISTRY/$ECR_MIGRATE_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_MIGRATE_REPO:latest"

      - name: Run database migration
        if: steps.infra.outputs.ready == 'true'
        run: |
          MIGRATE_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$ECS_CLUSTER-migrate" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Reuse the app service network config so migrate reaches RDS
          NET_CONFIG=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_APP_SERVICE" \
            --query 'services[0].networkConfiguration' \
            --output json)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$MIGRATE_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$NET_CONFIG" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed (exit $EXIT_CODE) — check CloudWatch: /ecs/$ECS_CLUSTER-migrate"
            exit 1
          fi
          echo "Migration succeeded"

      - name: Force ECS deployment
        if: steps.infra.outputs.ready == 'true'
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_APP_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Deployment summary
        if: steps.infra.outputs.ready == 'true'
        run: |
          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Cluster: \`$ECS_CLUSTER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: \`$ECS_APP_SERVICE\`" >> "$GITHUB_STEP_SUMMARY"
