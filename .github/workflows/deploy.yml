name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_API_REPO: research-pipeline-api
  ECR_WORKER_REPO: research-pipeline-worker
  ECR_NGINX_REPO: research-pipeline-nginx
  ECS_CLUSTER: research-pipeline
  ECS_APP_SERVICE: research-pipeline-app

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_NGINX_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_NGINX_REPO:latest" \
            ./nginx
          docker push "$REGISTRY/$ECR_NGINX_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_NGINX_REPO:latest"

          docker build \
            -t "$REGISTRY/$ECR_API_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_API_REPO:latest" \
            ./api
          docker push "$REGISTRY/$ECR_API_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_API_REPO:latest"

          docker build \
            -t "$REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_WORKER_REPO:latest" \
            ./worker
          docker push "$REGISTRY/$ECR_WORKER_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_WORKER_REPO:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_APP_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Deployment summary
        run: |
          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Image tag: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Cluster: \`$ECS_CLUSTER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: \`$ECS_APP_SERVICE\`" >> "$GITHUB_STEP_SUMMARY"