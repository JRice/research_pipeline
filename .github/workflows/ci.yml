name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API dependencies
        run: pip install -r api/requirements.txt httpx requests pytest

      - name: Run API tests
        run: pytest api/tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt pytest

      - name: Run worker tests
        run: pytest worker/tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build nginx image
        run: docker build ./nginx

      - name: Build API image
        run: docker build ./api

      - name: Build worker image
        run: docker build ./worker